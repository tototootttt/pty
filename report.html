<head>

  <style>
    *{

      font-family:"Sarabun","Segoe UI",sans-serif;
    }

    html, body{
      height:100%;
      margin:0;
      overflow:hidden;
      background:#dfe5ee;
      color:#1f2937;
    }

    body{
      padding:10px;
    }

    .container{
      width:100%;
      height:calc(100vh - 20px);
      max-width:1400px;
      margin:0 auto;
    }

    .card{
      height:100%;
      display:flex;
      flex-direction:column;
      background:#fff;
      border-radius:20px;
      box-shadow:0 12px 30px rgba(18,38,63,.08);
      border:1px solid #e6eef8;
      overflow:hidden;
    }

    .header{
      flex:0 0 auto;
      padding:16px 20px 12px;
      background:linear-gradient(135deg,#0f4c81,#2563eb);
      color:#fff;
    }

    .header h1{
      margin:0 0 4px;
      font-size:18px;
      line-height:1.3;
    }

    .header p{
      margin:0;
      font-size:12px;
      opacity:.95;
    }

    .toolbar{
      flex:0 0 auto;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
      padding:10px 14px;
      background:#f3f6fb;
      border-bottom:1px solid #dfe7f3;
    }

    .toolbar-left,.toolbar-right{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
    }

    button{
      border:none;
      border-radius:10px;
      padding:7px 12px;
      cursor:pointer;
      font-size:12px;
      font-weight:700;
      transition:.15s ease;
    }

    button:hover{
      transform:translateY(-1px);
    }

    .btn-primary{ background:#2563eb; color:#fff; }
    .btn-success{ background:#10b981; color:#fff; }
    .btn-secondary{ background:#e5eefb; color:#1e3a8a; }
    .btn-danger{ background:#fee2e2; color:#b91c1c; }

    .page-btn{
      background:#edf2ff;
      color:#1d4ed8;
      min-width:36px;
      padding:7px 10px;
    }

    .page-btn.active{
      background:#2563eb;
      color:#fff;
    }

    .table-panel{
      flex:1 1 auto;
      min-height:0;
      padding:10px;
      background:#f8fbff;
    }

    .table-wrap{
      height:100%;
      overflow:auto;
      border:1px solid #dbe4f2;
      border-radius:14px;
      background:#fff;
    }

    table{
      width:100%;
      border-collapse:collapse;
      table-layout:fixed;
      font-size:11px;
      min-width:1150px;
    }

    thead th{
      position:sticky;
      top:0;
      z-index:5;
      background:#dfe8f5;
      color:#16325c;
      font-weight:700;
      text-align:center;
      padding:8px 6px;
      border:1px solid #d0dcec;
      word-break:break-word;
    }

    tbody td{
      padding:5px;
      border:1px solid #e5ebf3;
      vertical-align:top;
      word-break:break-word;
      overflow-wrap:break-word;
      background:#fff;
    }

    tbody tr:nth-child(even) td{
      background:#fbfdff;
    }

    .editable{
      width:100%;
      min-height:26px;
      padding:4px 6px;
      border-radius:8px;
      outline:none;
      border:1px solid transparent;
      white-space:pre-wrap;
      word-break:break-word;
      line-height:1.35;
      font-size:11px;
    }

    .editable:focus{
      background:#fff;
      border-color:#93c5fd;
      box-shadow:0 0 0 2px rgba(37,99,235,.08);
    }

    .center{
      text-align:center;
    }

    .check-group{
      display:flex;
      flex-direction:column;
      gap:4px;
    }

    .check-item{
      display:flex;
      align-items:center;
      gap:6px;
      background:#f5f9ff;
      border:1px solid #dce9ff;
      border-radius:8px;
      padding:4px 6px;
      font-size:10px;
      line-height:1.2;
    }

    .check-item input[type="checkbox"]{
      width:14px;
      height:14px;
      accent-color:#2563eb;
      flex-shrink:0;
    }

    .status-badge{
      display:inline-block;
      padding:4px 8px;
      border-radius:999px;
      font-size:10px;
      font-weight:800;
      text-align:center;
      background:#fff7ed;
      color:#c2410c;
      border:1px solid #fed7aa;
      margin-top:4px;
    }

    .status-done{
      background:#ecfdf5;
      color:#047857;
      border-color:#a7f3d0;
    }

    .action-btn{
      width:100%;
      border:none;
      background:#fee2e2;
      color:#b91c1c;
      border-radius:8px;
      padding:6px 4px;
      font-size:10px;
      font-weight:700;
      cursor:pointer;
    }

    col.no{width:4%}
    col.code{width:5%}
    col.office{width:10%}
    col.division{width:11%}
    col.dataset{width:16%}
    col.filetype{width:5%}
    col.frequency{width:5%}
    col.latest{width:13%}
    col.update{width:13%}
    col.check{width:11%}
    col.note{width:5%}
    col.action{width:2%}

    @media (max-width: 1000px){
      .header h1{ font-size:16px; }
      .header p{ font-size:11px; }
      button{ font-size:11px; padding:6px 10px; }
      table{ font-size:10px; }
      .editable{ font-size:10px; }
      .check-item{ font-size:9px; }
    }
  </style>
</head>

    function getData(){
      const saved = localStorage.getItem("pattayaDataTable48");
      return saved ? JSON.parse(saved) : defaultData;
    }

    function setData(data){
      localStorage.setItem("pattayaDataTable48", JSON.stringify(data));
    }

    function getStatusClass(row){
      return (row.checkDisplay && row.checkVisualization && row.checkDictionary)
        ? "status-badge status-done"
        : "status-badge";
    }

    function getStatusText(row){
      return (row.checkDisplay && row.checkVisualization && row.checkDictionary) ? "ครบถ้วน" : "ค้าง";
    }

    function renderPagination(totalItems){
      const totalPages = Math.ceil(totalItems / pageSize) || 1;
      if(currentPage > totalPages) currentPage = totalPages;

      const el = document.getElementById("pagination");
      el.innerHTML = "";

      for(let i=1;i<=totalPages;i++){
        const btn = document.createElement("button");
        btn.className = "page-btn" + (i === currentPage ? " active" : "");
        btn.textContent = i;
        btn.onclick = () => {
          saveCurrentPageEdits();
          currentPage = i;
          renderTable();
        };
        el.appendChild(btn);
      }
    }

    function renderTable(){
      const data = getData();
      const tbody = document.getElementById("tableBody");
      tbody.innerHTML = "";

      const start = (currentPage - 1) * pageSize;
      const pageRows = data.slice(start, start + pageSize);

      pageRows.forEach((row, pageIndex) => {
        const tr = document.createElement("tr");
        tr.dataset.realIndex = start + pageIndex;

        tr.innerHTML = `
          <td class="center"><div class="editable" contenteditable="true">${row.no || ""}</div></td>
          <td class="center"><div class="editable" contenteditable="true">${row.code || ""}</div></td>
          <td><div class="editable" contenteditable="true">${row.office || ""}</div></td>
          <td><div class="editable" contenteditable="true">${row.division || ""}</div></td>
          <td><div class="editable" contenteditable="true">${row.dataset || ""}</div></td>
          <td class="center"><div class="editable" contenteditable="true">${row.filetype || ""}</div></td>
          <td class="center"><div class="editable" contenteditable="true">${row.frequency || ""}</div></td>
          <td><div class="editable" contenteditable="true">${row.latest || ""}</div></td>
          <td><div class="editable" contenteditable="true">${row.update || ""}</div></td>
          <td>
            <div class="check-group">
              <label class="check-item">
                <input type="checkbox" ${row.checkDisplay ? "checked" : ""} onchange="updateStatus(this)">
                แสดงผล
              </label>
              <label class="check-item">
                <input type="checkbox" ${row.checkVisualization ? "checked" : ""} onchange="updateStatus(this)">
                Visual
              </label>
              <label class="check-item">
                <input type="checkbox" ${row.checkDictionary ? "checked" : ""} onchange="updateStatus(this)">
                Dictionary
              </label>
              <div class="${getStatusClass(row)}">${getStatusText(row)}</div>
            </div>
          </td>
          <td><div class="editable" contenteditable="true">${row.note || ""}</div></td>
          <td class="center"><button class="action-btn" onclick="deleteRow(this)">ลบ</button></td>
        `;
        tbody.appendChild(tr);
      });

      renderPagination(data.length);
    }

    function saveCurrentPageEdits(){
      const data = getData();
      const rows = document.querySelectorAll("#tableBody tr");

      rows.forEach((row) => {
        const idx = Number(row.dataset.realIndex);
        const editables = row.querySelectorAll(".editable");
        const checks = row.querySelectorAll('input[type="checkbox"]');

        data[idx] = {
          no: editables[0]?.innerText.trim() || "",
          code: editables[1]?.innerText.trim() || "",
          office: editables[2]?.innerText.trim() || "",
          division: editables[3]?.innerText.trim() || "",
          dataset: editables[4]?.innerText.trim() || "",
          filetype: editables[5]?.innerText.trim() || "",
          frequency: editables[6]?.innerText.trim() || "",
          latest: editables[7]?.innerText.trim() || "",
          update: editables[8]?.innerText.trim() || "",
          checkDisplay: checks[0]?.checked || false,
          checkVisualization: checks[1]?.checked || false,
          checkDictionary: checks[2]?.checked || false,
          note: editables[9]?.innerText.trim() || ""
        };
      });

      setData(data);
    }

    function saveTable(){
      saveCurrentPageEdits();
      alert("บันทึกข้อมูลเรียบร้อยแล้ว");
    }

    function loadTable(){
      renderTable();
    }

    function addRow(){
      saveCurrentPageEdits();
      const data = getData();
      data.push({
        no:String(data.length + 1),
        code:"",
        office:"",
        division:"",
        dataset:"",
        filetype:"CSV",
        frequency:"1 ปี",
        latest:"",
        update:"",
        checkDisplay:false,
        checkVisualization:false,
        checkDictionary:false,
        note:""
      });
      setData(data);
      currentPage = Math.ceil(data.length / pageSize);
      renderTable();
    }

    function deleteRow(button){
      if(!confirm("ต้องการลบแถวนี้ใช่หรือไม่?")) return;
      saveCurrentPageEdits();
      const row = button.closest("tr");
      const idx = Number(row.dataset.realIndex);
      const data = getData();
      data.splice(idx, 1);

      data.forEach((item, i) => item.no = String(i + 1));
      setData(data);

      const totalPages = Math.ceil(data.length / pageSize) || 1;
      if(currentPage > totalPages) currentPage = totalPages;

      renderTable();
    }

    function clearTable(){
      if(!confirm("ต้องการล้างข้อมูลทั้งหมดใช่หรือไม่?")) return;
      localStorage.removeItem("pattayaDataTable48");
      currentPage = 1;
      renderTable();
    }

    function updateStatus(checkbox){
      const tr = checkbox.closest("tr");
      const checks = tr.querySelectorAll('input[type="checkbox"]');
      const badge = tr.querySelector(".status-badge");
      const allChecked = [...checks].every(c => c.checked);

      badge.className = allChecked ? "status-badge status-done" : "status-badge";
      badge.textContent = allChecked ? "ครบถ้วน" : "ค้าง";
    }

    loadTable();
  </script>
